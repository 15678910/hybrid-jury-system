name: 개혁안 뉴스 자동수집 (무료 크론)

# Firebase 스케줄러(상시 과금) 대신 GitHub Actions 무료 cron으로 매일 개혁뉴스를 수집한다.
# - collectReformNewsCron HTTPS 함수를 CRON_TOKEN 으로 인증해 호출 → 네이버 API 수집 → Firestore 저장.
# - CRON_TOKEN 시크릿이 없으면 함수가 401/503을 반환하고 워크플로는 실패로 표시된다(과금·오작동 없음).
#
# 필요한 시크릿:
#   - CRON_TOKEN : functions/.env 의 CRON_TOKEN 과 동일한 값
#     (GitHub → Settings → Secrets and variables → Actions → New repository secret)

on:
  schedule:
    - cron: '0 23 * * *'    # 매일 08:00 KST (23:00 UTC)
  workflow_dispatch:          # 수동 실행 버튼

concurrency:
  group: reform-news-cron
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 개혁안 뉴스 수집 트리거 호출
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
        run: |
          if [ -z "$CRON_TOKEN" ]; then
            echo "::error::CRON_TOKEN 시크릿이 없습니다. GitHub → Settings → Secrets and variables → Actions 에 추가하세요."
            exit 1
          fi
          # --data '' : 빈 본문(Content-Length: 0) — GCF 프론트엔드의 411(Length Required) 방지
          curl -fsS -X POST --data '' \
            -H "x-cron-key: $CRON_TOKEN" \
            --connect-timeout 30 --max-time 290 \
            "https://us-central1-siminbupjung-blog.cloudfunctions.net/collectReformNewsCron" \
            -w "\nHTTP %{http_code}\n"
