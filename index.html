      // GTM을 requestIdleCallback 또는 setTimeout으로 지연 로드
      // 첫 페인트를 차단하지 않도록 처리

        var loaded = false;

          if (loaded) return;

          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-CV4K9D5TRC';
          document.head.appendChild(script);
          // dataLayer 초기화
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-CV4K9D5TRC');
        }
        // 사용자 첫 상호작용 시 즉시 로드 (정확한 이벤트 추적 보장)
        ['mousedown', 'touchstart', 'keydown', 'scroll'].forEach(function(event) {
          document.addEventListener(event, loadGTM, { once: true, passive: true });
        });
        // 상호작용 없을 경우 3초 후 폴백 로드 (세션 추적 누락 방지)
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGTM, { timeout: 3000 });
        } else {
          setTimeout(loadGTM, 3000);
        }
      })();
    </script>
